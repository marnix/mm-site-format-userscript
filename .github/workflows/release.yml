name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      # The tag (e.g. v0.1.0) is the source of truth for the version; strip the
      # leading "v" so the build stamps @version 0.1.0.
      - run: echo "MMSF_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run ci
      - name: Create the GitHub release with the built userscript
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME" dist/mm-site-format.user.js
          --title "$GITHUB_REF_NAME" --generate-notes
